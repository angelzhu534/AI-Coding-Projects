<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e8e0c8">
<title>SF Neighborhoods</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5edd8;--paper2:#ede0c0;--paper3:#e4d4a8;
  --ink:#2a2010;--ink2:#5a4a28;--ink3:#9a8660;
  --border:rgba(90,70,20,0.13);--border2:rgba(90,70,20,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;color:var(--ink);}

#map{position:fixed;inset:0;z-index:0;}
.leaflet-tile-pane{filter:sepia(14%) brightness(0.97) saturate(0.9);transition:filter .4s;}
.leaflet-control-attribution{font-size:8px;opacity:0.4;background:rgba(245,237,216,0.7)!important;}
.leaflet-control-zoom{display:none;}

.leaflet-tooltip.nh-label{
  background:rgba(245,237,216,0.94)!important;
  border:1px solid rgba(90,70,20,0.18)!important;
  border-radius:5px!important;
  font-family:'Lora',Georgia,serif!important;
  font-style:italic!important;
  font-size:10px!important;
  color:#2a2010!important;
  padding:2px 7px!important;
  box-shadow:0 1px 8px rgba(0,0,0,0.14)!important;
  white-space:nowrap!important;
  pointer-events:none!important;
}
.leaflet-tooltip.nh-label::before{display:none!important;}

/* FILTER BAR */
#filter-bar{
  position:fixed;top:0;left:0;right:0;z-index:600;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 12px 10px;
  background:linear-gradient(to bottom,var(--paper) 60%,transparent);
  pointer-events:none;
}
#filter-scroll{
  display:flex;gap:7px;overflow-x:auto;pointer-events:all;
  scrollbar-width:none;padding-bottom:2px;padding-right:58px;
}
#filter-scroll::-webkit-scrollbar{display:none;}
.fp{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;
  border:1.5px solid var(--border2);background:var(--paper);
  color:var(--ink2);white-space:nowrap;cursor:pointer;
  box-shadow:0 2px 8px rgba(60,40,0,0.14);transition:all .16s;
}
.fp.on{color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,0.22);}

/* LAYER SWITCHER */
#layer-btn{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);right:12px;
  z-index:650;width:42px;height:42px;border-radius:11px;
  background:var(--paper);border:1.5px solid var(--border2);
  box-shadow:0 2px 10px rgba(60,40,0,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
}
#layer-panel{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 58px);right:12px;
  z-index:650;background:var(--paper);border-radius:14px;
  padding:8px;box-shadow:0 4px 24px rgba(60,40,0,0.22);
  border:1.5px solid var(--border2);
  opacity:0;pointer-events:none;
  transform:translateY(-8px) scale(0.96);
  transition:opacity .18s,transform .18s;
  display:flex;flex-direction:column;gap:3px;min-width:140px;
}
#layer-panel.open{opacity:1;pointer-events:all;transform:none;}
.layer-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);padding:4px 10px 2px;}
.lopt{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--ink2);transition:background .12s;
}
.lopt:hover{background:var(--paper2);}
.lopt.on{background:var(--paper3);color:var(--ink);}
.lopt .li{font-size:15px;line-height:1;}

/* ── BOTTOM SHEET ──────────────────────────────────────────────────────
   Positioned at top:0 so translateY is measured from top of viewport.
   Peak (72px showing) = translateY(sheetHeight - 72)
   Half (~48% viewport) = translateY(sheetHeight - 0.48*vh)
   Full (~90% viewport) = translateY(sheetHeight - 0.90*vh)          */
#sheet{
  position:fixed;top:0;left:0;right:0;
  height:92vh;z-index:700;
  background:var(--paper);
  border-radius:22px 22px 0 0;
  box-shadow:0 -6px 40px rgba(60,40,0,0.18),0 -1px 0 var(--border2);
  display:flex;flex-direction:column;
  will-change:transform;overflow:hidden;
  touch-action:none;
}
#handle-area{
  padding:14px 0 8px;min-height:44px;
  display:flex;justify-content:center;align-items:center;
  flex-shrink:0;cursor:pointer;user-select:none;
}
.handle-bar{width:38px;height:4px;border-radius:2px;background:var(--border2);transition:background .2s;}
#handle-area:hover .handle-bar{background:var(--ink3);}

#sheet-placeholder{padding:0 20px 20px;flex-shrink:0;text-align:center;}
#sheet-placeholder p{font-family:'Lora',serif;font-style:italic;font-size:13px;color:var(--ink3);line-height:1.85;}

#sheet-content{display:none;flex-direction:column;flex:1;overflow:hidden;}

.sheet-header{
  padding:0 20px 14px;flex-shrink:0;
  border-bottom:1.5px solid var(--border);
  overflow-y:auto;max-height:50vh;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.sheet-header::-webkit-scrollbar{display:none;}
.color-strip{height:4px;border-radius:2px;margin-bottom:12px;}
.s-name{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:2px;letter-spacing:-0.3px;}
.s-vibe{font-size:10px;color:var(--ink3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px;}
#s-desc{font-family:'Lora',serif;font-style:italic;font-size:13.5px;line-height:1.85;color:var(--ink2);margin-bottom:12px;}
.scores-wrap{margin-bottom:4px;}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.score-lbl{font-size:9px;color:var(--ink3);width:56px;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;}
.score-track{flex:1;height:3px;border-radius:2px;background:var(--border);}
.score-fill{height:100%;border-radius:2px;transition:width .4s;}
.score-val{font-size:9px;color:var(--ink3);width:10px;text-align:right;}

.tabs-row{display:flex;border-bottom:1.5px solid var(--border);padding:0 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;background:var(--paper);}
.tabs-row::-webkit-scrollbar{display:none;}
.tb{flex-shrink:0;padding:9px 11px;font-size:12px;font-weight:700;color:var(--ink3);border:none;background:transparent;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .12s;}
.tb.on{color:var(--ink);border-bottom-color:var(--ink);}

#tab-body{flex:1;overflow-y:auto;padding:14px 20px 40px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#tab-body::-webkit-scrollbar{display:none;}
.tab-panel{display:none;}
.tab-panel.on{display:block;}
.t-head{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin:4px 0 8px;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.tag{font-size:11px;padding:5px 11px;border-radius:7px;background:var(--paper2);border:1px solid var(--border2);color:var(--ink2);line-height:1.5;}
.tab-note{font-size:12px;line-height:1.78;color:var(--ink2);font-family:'Lora',serif;font-style:italic;}

#title-card{position:fixed;bottom:84px;left:16px;z-index:600;pointer-events:none;transition:opacity .3s;}
#title-card h1{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-0.5px;text-shadow:0 1px 6px rgba(240,220,160,0.9);}
#title-card p{font-family:'Lora',serif;font-style:italic;font-size:11px;color:var(--ink3);}
/* Illustrated layer overlay */
#illustrated-overlay{
  position:fixed;inset:0;z-index:1;
  display:none;pointer-events:none;
  background:var(--paper3);
}
#illustrated-overlay svg{
  width:100%;height:100%;
  display:block;
}
</style>

// ─── TILE PROVIDER CANDIDATES ─────────────────────────────────────────────
const TILE_CANDIDATES = {
  street: [
    ['https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
     {attribution:'&copy; OpenStreetMap', subdomains:'abc', maxZoom:19}]
  ],
  terrain: [
    ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
     {attribution:'&copy; Esri', maxZoom:19}],
    ['https://tile.opentopomap.org/{z}/{x}/{y}.png',
     {attribution:'&copy; OpenTopoMap', maxZoom:17}]
  ],
  satellite: [
    ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
     {attribution:'&copy; Esri', maxZoom:19}]
  ]
};

function probeTileUrl(urlTemplate, cb){
  const url = urlTemplate
    .replace('{z}','13').replace('{y}','3290').replace('{x}','1311')
    .replace(/\{s\}/g,'a');
  const img = new Image();
  let done = false;
  const finish = ok => { if(!done){ done=true; cb(ok); } };
  img.onload  = () => finish(true);
  img.onerror = () => finish(false);
  setTimeout(() => finish(false), 6000);
  img.src = url;
}

function buildLayer(key, onReady){
  if(key === 'illustrated'){ onReady(buildIllustratedLayer(), key); return; }
  const candidates = TILE_CANDIDATES[key] || [];
  let i = 0;
  function tryNext(){
    if(i >= candidates.length){ onReady(null, key); return; }
    const [url, opts] = candidates[i++];
    probeTileUrl(url, ok => ok ? onReady(L.tileLayer(url, opts), key) : tryNext());
  }
  tryNext();
}

const TILES = {street:null, terrain:null, satellite:null, illustrated:null};
let currentLayer = 'street';

buildLayer('street', (layer, key) => {
  TILES.street = layer || L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'&copy; OpenStreetMap', maxZoom:19});
  TILES.street.addTo(map);
});
buildLayer('terrain',    (layer, key) => { TILES.terrain    = layer; _markBtn(key, !!layer); });
buildLayer('satellite',  (layer, key) => { TILES.satellite  = layer; _markBtn(key, !!layer); });
buildLayer('illustrated',(layer, key) => { TILES.illustrated= layer; _markBtn(key, !!layer); });

function _markBtn(key, ok){
  const btn = document.querySelector(`[data-layer="${key}"]`);
  if(btn && !ok) btn.style.opacity = '0.4';
}

// ─── LAYER SWITCHER EVENTS ────────────────────────────────────────────────
document.getElementById('layer-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('layer-panel').classList.toggle('open');
});
document.addEventListener('click', e => {
  if(!document.getElementById('layer-panel').contains(e.target))
    document.getElementById('layer-panel').classList.remove('open');
});

function showToast(msg){
  let t = document.getElementById('map-toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'map-toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);'+
      'background:rgba(42,32,16,0.88);color:#f5edd8;padding:8px 18px;border-radius:20px;'+
      'font-size:12px;font-family:Nunito,sans-serif;z-index:800;pointer-events:none;'+
      'transition:opacity .4s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.opacity='0', 3000);
}

function setLayer(name){
  document.getElementById('layer-panel').classList.remove('open');
  if(name === currentLayer) return;
  if(!TILES[name]){ showToast('Layer unavailable in preview — download file to use offline'); return; }
  // Remove old layer
  if(TILES[currentLayer]){
    if(currentLayer === 'illustrated') map.removeLayer(TILES[currentLayer]);
    else map.removeLayer(TILES[currentLayer]);
  }
  // Set bg colour for illustrated so no grey tiles show
  document.getElementById('map').style.background =
    name === 'illustrated' ? '#78b8d0' : '#e8e0c8';
  TILES[name].addTo(map);
  currentLayer = name;
  document.querySelectorAll('.lopt').forEach(o =>
    o.classList.toggle('on', o.dataset.layer === name));
  const pane = document.querySelector('.leaflet-tile-pane');
  if(pane){
    if(name === 'satellite')    pane.style.filter = 'none';
    else if(name === 'illustrated') pane.style.filter = 'none';
    else if(name === 'terrain') pane.style.filter = 'sepia(6%) brightness(0.97) saturate(0.88)';
    else                        pane.style.filter = 'sepia(14%) brightness(0.97) saturate(0.9)';
  }
}

// ═══════════════════════════════════════════════════════
//  MARKERS
// ═══════════════════════════════════════════════════════
let CF = 'all';
let CN = null;
const markerMap = {};

function dotSize(n, filterKey){
  if(filterKey === 'all') return {r:6, glow:10, op:1};
  const v = n.s[filterKey] || 1;
  const sz = [null, {r:3,glow:5,op:0.35}, {r:4,glow:7,op:0.55}, {r:5,glow:9,op:0.75}, {r:6,glow:11,op:0.9}, {r:8,glow:14,op:1}];
  return sz[v] || sz[1];
}

function makeDotSVG(color, size, selected){
  const {r, glow} = size;
  const gr = selected ? r*2.2 : glow;
  const svgSize = 60;
  const c = svgSize/2;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${svgSize}" height="${svgSize}" viewBox="0 0 ${svgSize} ${svgSize}">
    <circle cx="${c}" cy="${c}" r="${gr}" fill="${color}" opacity="${selected ? 0.38 : 0.18}"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="${color}" stroke="#f8f0dc" stroke-width="1.5" opacity="${size.op}"/>
    ${selected ? `<circle cx="${c}" cy="${c}" r="${r*0.45}" fill="#fff" opacity="0.6"/>` : ''}
  </svg>`;
}

function createIcon(color, size, selected){
  const svgSize = 60;
  return L.divIcon({
    html: makeDotSVG(color, size, selected),
    className: '',
    iconSize: [svgSize, svgSize],
    iconAnchor: [svgSize/2, svgSize/2],
    tooltipAnchor: [svgSize/2 - 4, 0]
  });
}

ND.forEach(n => {
  const size = dotSize(n, CF);
  const marker = L.marker([n.lat, n.lng], {
    icon: createIcon(n.color, size, false),
    zIndexOffset: 0
  });
  marker.addTo(map);
  marker.bindTooltip(n.name, {
    permanent: false,
    direction: 'right',
    className: 'nh-label',
    offset: [16, 0]
  });
  marker.on('click', () => selectNeighbourhood(n));
  markerMap[n.id] = { marker, n };
});

function refreshMarkers(){
  Object.values(markerMap).forEach(({marker, n}) => {
    const selected = CN && CN.id === n.id;
    const size = dotSize(n, CF);
    marker.setIcon(createIcon(n.color, size, selected));
    marker.setZIndexOffset(selected ? 1000 : 0);
  });
}

// ═══════════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════════
function setFilter(btn, key, color){
  document.querySelectorAll('.fp').forEach(b=>{
    b.classList.remove('on'); b.style.background=''; b.style.color=''; b.style.borderColor='';
  });
  btn.classList.add('on'); btn.style.background = color; btn.style.borderColor = color;
  CF = key;
  refreshMarkers();
}

// ═══════════════════════════════════════════════════════
//  SHEET SNAP LOGIC  (top:0 positioning)
// ═══════════════════════════════════════════════════════
const sheet = document.getElementById('sheet');
const handleArea = document.getElementById('handle-area');
const placeholder = document.getElementById('sheet-placeholder');
const sheetContent = document.getElementById('sheet-content');

const PEEK_PX = 72;         // how many px peek from bottom when collapsed
const HALF_FRAC = 0.48;     // fraction of viewport when "half open"
const FULL_FRAC = 0.90;     // fraction of viewport when "full open"

let currentSnap = 'peek';
let isDragging = false;
let startY = 0;
let startTranslateY = 0;

function getSheetH(){ return sheet.offsetHeight; }

function snapToPx(snap){
  const wH = window.innerHeight;
  const sH = getSheetH();
  if(snap === 'hidden') return sH;
  if(snap === 'peek')   return sH - PEEK_PX;
  if(snap === 'half')   return sH - Math.round(wH * HALF_FRAC);
  if(snap === 'full')   return sH - Math.round(wH * FULL_FRAC);
  return sH - PEEK_PX;
}

function applyTranslate(y, animate){
  sheet.style.transition = animate ? 'transform .32s cubic-bezier(.32,.72,0,1)' : 'none';
  sheet.style.transform = `translateY(${y}px)`;
}

function snapSheet(snap, animate=true){
  currentSnap = snap;
  applyTranslate(snapToPx(snap), animate);
}

snapSheet('hidden', false);

// Click on handle — cycle through snaps
handleArea.addEventListener('click', e => {
  if(isDragging) return;
  if(currentSnap === 'hidden' || currentSnap === 'peek'){
    snapSheet(CN ? 'full' : 'peek');
  } else if(currentSnap === 'half'){
    snapSheet('full');
  } else {
    snapSheet('hidden');
  }
});

// Touch drag on handle
handleArea.addEventListener('touchstart', e => {
  isDragging = false;
  const touch = e.touches[0];
  startY = touch.clientY;
  const mat = new DOMMatrixReadOnly(getComputedStyle(sheet).transform);
  startTranslateY = mat.m42;
  sheet.style.transition = 'none';
}, {passive:true});

handleArea.addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - startY;
  if(Math.abs(dy) > 4) isDragging = true;
  if(!isDragging) return;
  const sH = getSheetH();
  const minY = sH - Math.round(window.innerHeight * FULL_FRAC);
  const maxY = sH - PEEK_PX;
  const newY = Math.max(minY, Math.min(maxY, startTranslateY + dy));
  applyTranslate(newY, false);
}, {passive:true});

handleArea.addEventListener('touchend', e => {
  if(!isDragging){ isDragging=false; return; }
  isDragging = false;
  const mat = new DOMMatrixReadOnly(getComputedStyle(sheet).transform);
  const curY = mat.m42;
  const vel = e.changedTouches[0].clientY - startY;
  const sH = getSheetH();
  const peekY = sH - PEEK_PX;
  const halfY = sH - Math.round(window.innerHeight * HALF_FRAC);
  const fullY = sH - Math.round(window.innerHeight * FULL_FRAC);

  const hiddenY = snapToPx('hidden');
  let target;
  if(vel < -50){
    target = currentSnap==='hidden'?'peek': currentSnap==='peek'?'half':'full';
  } else if(vel > 50){
    target = currentSnap==='full'?'half': currentSnap==='half'?'peek':'hidden';
  } else {
    const dists = {hidden:Math.abs(curY-hiddenY), peek:Math.abs(curY-peekY), half:Math.abs(curY-halfY), full:Math.abs(curY-fullY)};
    target = Object.entries(dists).sort((a,b)=>a[1]-b[1])[0][0];
  }
  snapSheet(target);
});

window.addEventListener('resize', () => snapSheet(currentSnap, false));

// ═══════════════════════════════════════════════════════
//  NEIGHBOURHOOD SELECTION
// ═══════════════════════════════════════════════════════
function tags(arr){ return arr.map(s=>`<span class="tag">${s}</span>`).join(''); }

function scoreHTML(n){
  return Object.keys(SK).map(k=>`
    <div class="score-row">
      <span class="score-lbl">${SK[k]}</span>
      <div class="score-track"><div class="score-fill" style="width:${n.s[k]*20}%;background:${n.color}"></div></div>
      <span class="score-val">${n.s[k]}</span>
    </div>`).join('');
}

function selectNeighbourhood(n){
  if(CN && CN.id === n.id){
    CN=null; refreshMarkers(); sheetContent.style.display='none'; placeholder.style.display=''; document.getElementById('title-card').style.opacity='1'; snapSheet('hidden'); return;
  }
  CN = n;
  refreshMarkers();

  // Fly map to neighbourhood
  map.panTo([n.lat, n.lng], {animate:true, duration:0.5});

  // Populate sheet header
  document.getElementById('color-strip').style.background = n.color;
  document.getElementById('s-name').textContent = n.name;
  document.getElementById('s-vibe').textContent = n.vibe;
  document.getElementById('s-desc').textContent = n.desc;
  document.getElementById('scores').innerHTML = scoreHTML(n);

  // Populate tabs
  document.getElementById('tab-lm').innerHTML =
    `<div class="t-head">Landmarks & Points of Interest</div><div class="tags">${tags(n.lm)}</div>`;
  document.getElementById('tab-na').innerHTML =
    `<div class="t-head">Parks & Trails</div><div class="tags">${tags(n.nat.p)}</div>
     <div class="t-head">Nature Notes</div><p class="tab-note">${n.nat.note}</p>`;
  document.getElementById('tab-ca').innerHTML =
    `<div class="t-head">Cafe Spots</div><div class="tags">${tags(n.caf.s)}</div>
     <div class="t-head">Cafe Culture</div><p class="tab-note">${n.caf.note}</p>`;
  document.getElementById('tab-fo').innerHTML =
    `<div class="t-head">Restaurants</div><div class="tags">${tags(n.fod.s)}</div>
     <div class="t-head">Food Scene</div><p class="tab-note">${n.fod.note}</p>`;
  document.getElementById('tab-tr').innerHTML =
    `<div class="t-head">Lines & Stations</div><div class="tags">${tags(n.trn.l)}</div>
     <div class="t-head">Transit Notes</div><p class="tab-note">${n.trn.note}</p>`;

  // Reset to first tab
  showTab('lm', null, true);

  // Show content
  placeholder.style.display = 'none';
  sheetContent.style.display = 'flex';
  document.getElementById('title-card').style.opacity = '0';
  document.getElementById('tab-body').scrollTop = 0;
  document.querySelector('.sheet-header').scrollTop = 0;

  // Snap sheet open
  snapSheet('full');
}

function showTab(tid, btn, reset){
  ['lm','na','ca','fo','tr'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if(el) el.classList.toggle('on', t===tid);
  });
  if(reset){
    document.querySelectorAll('.tb').forEach((b,i)=>
      b.classList.toggle('on', ['lm','na','ca','fo','tr'][i]===tid));
  } else if(btn){
    document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }
}

map.on('click', () => {
  if(CN){ CN=null; refreshMarkers(); sheetContent.style.display='none'; placeholder.style.display=''; document.getElementById('title-card').style.opacity='1'; }
  snapSheet('hidden');
});

// Update count
document.getElementById('tc-count').textContent = `${ND.length} neighborhoods · tap to explore`;
</script>
